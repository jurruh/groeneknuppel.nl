<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plop</title>
<style>
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: radial-gradient(circle at 50% 30%, #1b3d24 0%, #0a1c11 70%, #06120a 100%);
    overflow: hidden;
    font-family: "Helvetica Neue", Arial, sans-serif;
  }
  .hint {
    margin: 0;
    color: #e9f3ea;
    opacity: .7;
    font-size: 15px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-align: center;
    max-width: min(90vw, 520px);
    padding: 0 16px;
    box-sizing: border-box;
  }
  .counter {
    position: fixed;
    top: 22px;
    right: 22px;
    margin: 0;
    padding: 14px 26px;
    border-radius: 999px;
    color: #ffffff;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: 1px;
    background: linear-gradient(135deg, #f7b733 0%, #e34a3a 50%, #c8302b 100%);
    box-shadow: 0 8px 22px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.4);
    border: 2px solid rgba(255,255,255,.25);
    z-index: 10;
  }
  .counter span {
    color: #fff;
    font-size: 34px;
  }
  #stage {
    cursor: pointer;
    filter: drop-shadow(0 26px 34px rgba(0,0,0,.55));
    transition: transform .08s ease;
  }
  #stage:active { transform: scale(.99); }
  .bottle { transform-origin: 50% 65%; }
  .pop-anim { animation: pop .4s ease; }
  @keyframes pop {
    0%{transform:translateY(0) rotate(0)} 28%{transform:translateY(-16px) rotate(-1.5deg)}
    60%{transform:translateY(5px) rotate(.8deg)} 100%{transform:translateY(0) rotate(0)}
  }
  .swing { transform-origin: 150px 95px; }
  .cap-open { animation: capOpen .42s ease; }
  @keyframes capOpen {
    0%{transform:translateY(0) rotate(0)} 42%{transform:translateY(-26px) rotate(-16deg)}
    100%{transform:translateY(0) rotate(0)}
  }
</style>
</head>
<body>
  <svg id="stage" width="280" height="474" viewBox="0 0 300 508" xmlns="http://www.w3.org/2000/svg" aria-label="beer bottle">
    <defs>
      <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0"    stop-color="#0c3617"/>
        <stop offset="0.16" stop-color="#3f9a4e"/>
        <stop offset="0.36" stop-color="#69c46f"/>
        <stop offset="0.55" stop-color="#2f8a3c"/>
        <stop offset="0.78" stop-color="#114a1e"/>
        <stop offset="1"    stop-color="#05220d"/>
      </linearGradient>
      <linearGradient id="porcelain" x1="0" y1="0" x2="1" y2="0">
        <stop offset="0" stop-color="#deddd6"/>
        <stop offset="0.45" stop-color="#ffffff"/>
        <stop offset="1" stop-color="#bcbbb4"/>
      </linearGradient>
      <linearGradient id="wire" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#f2f2f4"/>
        <stop offset="0.5" stop-color="#b9b9bf"/>
        <stop offset="1" stop-color="#7c7c82"/>
      </linearGradient>
    </defs>

    <g class="bottle" id="bottle">
      <!-- body -->
      <path d="M120 150
               C120 185 95 205 92 263
               L88 398
               C87 443 112 468 150 468
               C188 468 213 443 212 398
               L208 263
               C205 205 180 185 180 150 Z"
            fill="url(#glass)" stroke="#05220d" stroke-width="3"/>
      <!-- neck -->
      <path d="M120 150 L120 100 C120 90 132 86 150 86 C168 86 180 90 180 100 L180 150 Z"
            fill="url(#glass)" stroke="#05220d" stroke-width="3"/>
      <!-- highlight -->
      <path d="M108 200 C100 263 102 350 108 398 C112 426 118 446 128 456
               C120 428 116 350 117 305 C118 263 122 230 130 208 Z"
            fill="#ffffff" opacity="0.45"/>

      <!-- swing-top -->
      <g class="swing" id="swing">
        <g fill="none" stroke="url(#wire)" stroke-width="6" stroke-linecap="round">
          <path d="M126 145 C120 118 120 100 130 88"/>
          <path d="M174 145 C180 118 180 100 170 88"/>
          <path d="M130 88 C138 74 162 74 170 88"/>
          <path d="M120 128 L180 128"/>
        </g>
        <ellipse cx="150" cy="86" rx="22" ry="8" fill="#cf2f24" stroke="#9c1f17" stroke-width="2"/>
        <path d="M130 68 C130 54 170 54 170 68 L170 82 C170 92 130 92 130 82 Z"
              fill="url(#porcelain)" stroke="#a9a8a1" stroke-width="2"/>
        <ellipse cx="150" cy="66" rx="20" ry="7" fill="#ffffff" stroke="#cfcec7" stroke-width="1.5"/>
      </g>
    </g>
  </svg>

  <p class="hint">Klikken - Vaak Bu'j te Bang</p>
  <p class="counter">Geplopt: <span id="count">0</span></p>

<script>
  const stage  = document.getElementById('stage');
  const bottle = document.getElementById('bottle');
  const swing  = document.getElementById('swing');

  let audioCtx;
  function ensureCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  const rnd = (a, b) => a + Math.random() * (b - a);

  // iOS speakers over-emphasize the high-frequency hiss, so tame it on iPhone/iPad.
  const isIOS = /iP(hone|ad|od)/.test(navigator.platform) ||
    (/Mac/.test(navigator.platform) && navigator.maxTouchPoints > 1) ||
    /iPhone|iPad|iPod/.test(navigator.userAgent);
  const hissPeak = isIOS ? 0.0026 : 0.00525;   // ~half as loud on iOS
  const hissHi   = isIOS ? 3000 : 5500;        // start lower so it's not in the phone's "hot" band
  const hissLo   = isIOS ? 1400 : 2600;

  // Realistic beer-bottle open: a hollow "pock" of the cap releasing,
  // immediately followed by the pressurized CO2 "pssht" hiss.
  function playPlop() {
    const ctx = ensureCtx();
    const t = ctx.currentTime;
    const pitch = rnd(0.92, 1.1);   // tiny variation so it's not identical each time

    // --- 1) The "pock": short resonant thud of the cap popping ---
    const osc = ctx.createOscillator();
    const og = ctx.createGain();
    const bp = ctx.createBiquadFilter();
    bp.type = 'bandpass'; bp.frequency.value = 420 * pitch; bp.Q.value = 8;
    osc.type = 'sine';
    osc.frequency.setValueAtTime(520 * pitch, t);
    osc.frequency.exponentialRampToValueAtTime(150 * pitch, t + 0.05);
    og.gain.setValueAtTime(0.0001, t);
    og.gain.exponentialRampToValueAtTime(0.85, t + 0.004);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
    osc.connect(bp).connect(og).connect(ctx.destination);
    osc.start(t); osc.stop(t + 0.1);

    // sharp click transient (the metal/glass release)
    const click = ctx.createOscillator();
    const cg = ctx.createGain();
    click.type = 'square';
    click.frequency.setValueAtTime(2200, t);
    click.frequency.exponentialRampToValueAtTime(600, t + 0.008);
    cg.gain.setValueAtTime(0.3, t);
    cg.gain.exponentialRampToValueAtTime(0.0001, t + 0.012);
    click.connect(cg).connect(ctx.destination);
    click.start(t); click.stop(t + 0.015);

    // --- 2) The "pssht": pressurized gas escaping ---
    const hissStart = t + 0.02;
    const dur = rnd(0.6, 0.85);
    const buf = ctx.createBuffer(1, Math.ceil(ctx.sampleRate * dur), ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const noise = ctx.createBufferSource(); noise.buffer = buf;

    const hbp = ctx.createBiquadFilter();
    hbp.type = 'bandpass';
    hbp.frequency.setValueAtTime(hissHi, hissStart);
    hbp.frequency.exponentialRampToValueAtTime(hissLo, hissStart + dur);
    hbp.Q.value = 0.8;
    const hg = ctx.createGain();
    hg.gain.setValueAtTime(0.0001, hissStart);
    hg.gain.exponentialRampToValueAtTime(hissPeak, hissStart + 0.03);   // soft burst
    // smooth, natural fade-out for the rest of the hiss
    hg.gain.setTargetAtTime(0.0001, hissStart + 0.06, dur * 0.32);
    noise.connect(hbp).connect(hg).connect(ctx.destination);
    noise.start(hissStart);
  }

  // Clean up the class as soon as each animation finishes so it can replay.
  bottle.addEventListener('animationend', () => bottle.classList.remove('pop-anim'));
  swing.addEventListener('animationend', () => swing.classList.remove('cap-open'));

  const countEl = document.getElementById('count');
  const hintEl = document.querySelector('.hint');
  let count = parseInt(localStorage.getItem('ploppedCount'), 10) || 0;
  countEl.textContent = count;   // toon opgeslagen waarde bij laden

  // Achterhoekse spreuken — bij elke klik verschijnt er een andere.
  const spreuken = [
    "A'j plat kunt proaten, mo'j 't neet loaten",
    "Hold oe kreggel",
    "Wee niet sterk is, mot slim wèzen",
    "Doe maor gewoon, dan doe i'j al gek genog",
    "Now breck mien klomp",
    "Bu'j now helemoal van de pad?",
    "Doar he'j de poppen an't dansen",
    "Iej könt nich teggen de wind in pissen",
    "Better good gepikt as slecht eneajd",
    "Joa joa...",
    "'t löp wal los",
    "Wi'j gaot lekker høken",
    "As 't neet geet zoals 't mut, dan mut 't mar neet zoals 't geet",
    "Aj' de tied hebt, mo'j de tied nemmen",
    "Wi'j kunt 't neet allene doon",
    "Nae a'j de klokke heurt, mut 't peerd mennen",
    "Deur 't veurgoonde mot 't varken",
    "Jao's is ook jao, mao nee is nee",
    "Ie kunt de kat oet de boom kieken",
    "Nae vragt, kom iej neet wies",
    "Ie könt het merken an de tied",
    "As de daakpanne gaot glimmen, gaot de boer flink timmen",
  ];
  let lastSpreuk = -1;

  function pop() {
    playPlop();
    count++;
    countEl.textContent = count;
    localStorage.setItem('ploppedCount', count);

    // kies een andere spreuk dan de vorige
    let i;
    do { i = Math.floor(Math.random() * spreuken.length); }
    while (spreuken.length > 1 && i === lastSpreuk);
    lastSpreuk = i;
    hintEl.textContent = spreuken[i];
    bottle.classList.remove('pop-anim');
    swing.classList.remove('cap-open');
    // Force reflow on BOTH elements so the animations restart from scratch.
    void bottle.offsetWidth;
    void swing.getBoundingClientRect().width;
    bottle.classList.add('pop-anim');
    swing.classList.add('cap-open');
  }

  stage.addEventListener('click', pop);
</script>
</body>
</html>
